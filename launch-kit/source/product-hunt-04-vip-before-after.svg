    <text x="184" y="381" fill="#062456" font-family="Avenir Next, Arial, sans-serif" font-size="18" font-weight="700">Brand + structure + Premium craft</text>
  </g>
  <text x="635" y="686" text-anchor="middle" fill="#53637c" font-family="Avenir Next, Arial, sans-serif" font-size="18">Real repository fixtures rendered in-browser; no invented performance claim.</text>
