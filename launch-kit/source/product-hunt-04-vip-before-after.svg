  <g transform="translate(70 188)">
    <rect width="540" height="430" rx="22" fill="#fff" stroke="#E5484D" stroke-width="3"/>
    <image href="vip-before.png" x="16" y="16" width="508" height="318" preserveAspectRatio="xMidYMin slice"/>
    <rect x="16" y="350" width="150" height="48" rx="24" fill="#E5484D"/>
    <text x="91" y="381" text-anchor="middle" fill="#fff" font-family="Avenir Next, Arial, sans-serif" font-size="18" font-weight="800">REJECTED</text>
    <text x="184" y="381" fill="#062456" font-family="Avenir Next, Arial, sans-serif" font-size="18" font-weight="700">Clean template · Standard bar only</text>
